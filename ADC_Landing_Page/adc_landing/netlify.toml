[build]
  command = "echo 'Static landing page: no build step required'"
  publish = "."

[[redirects]]
  from = "/app"
  to   = "https://application-due-diligence.netlify.app"
  status = 301

[[redirects]]
  from = "/signin"
  to   = "https://application-due-diligence.netlify.app/login"
  status = 302

[[redirects]]
  from = "/login"
  to   = "https://application-due-diligence.netlify.app/login"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
