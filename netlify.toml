[build]
  base = "ADC_Landing_Page/adc_landing"
  publish = "."

[[redirects]]
  from = "/app"
  to   = "https://app.adcsystem.co.za"
  status = 301

[[redirects]]
  from = "/signin"
  to   = "https://app.adcsystem.co.za/login"
  status = 302

[[redirects]]
  from = "/login"
  to   = "https://app.adcsystem.co.za/login"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"
