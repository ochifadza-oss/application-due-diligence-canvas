[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://YOUR-RAILWAY-API.up.railway.app https://api.anthropic.com; img-src 'self' data: blob:; font-src 'self' data:"

[build.environment]
  NODE_VERSION = "20"
  VITE_APP_NAME    = "Application Due Diligence Canvas"
  VITE_APP_VERSION = "1.0.0"

# Uncomment and set VITE_API_BASE_URL in Netlify dashboard → Site Settings → Environment Variables
# VITE_API_BASE_URL = "https://YOUR-RAILWAY-APP.up.railway.app/api/v1"
